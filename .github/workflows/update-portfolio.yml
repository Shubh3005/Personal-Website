name: Update Portfolio

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Portfolio Agent
        env:
          PORTFOLIO_GH_PAT: ${{ secrets.PORTFOLIO_GH_PAT }}
          ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
          ROBOFLOW_WORKSPACE: ${{ vars.ROBOFLOW_WORKSPACE }}
          ROBOFLOW_PROJECT: ${{ vars.ROBOFLOW_PROJECT }}
        run: python scripts/agent.py

      - name: Commit updated portfolio.json
        run: |
          git config user.name  "portfolio-agent[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add portfolio.json
          if git diff --cached --quiet; then
            echo "No changes to portfolio.json — skipping commit."
          else
            git commit -m "chore: update portfolio.json [automated]"
            git push
          fi
